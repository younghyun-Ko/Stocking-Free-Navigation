<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 111 100">
  <defs>
    <filter id="cctv-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.4" flood-color="#ffffff" flood-opacity="0.55" />
    </filter>
  </defs>

  <g filter="url(#cctv-glow)">
    <!-- 굵은 검은 테두리 (얇은 외곽 스트로크 포함) -->
    <path
      d="M 48.68 14.23 L 8.82 85.77 Q 2 98 16 98 L 95 98 Q 109 98 102.18 85.77 L 62.32 14.23 Q 55.5 2 48.68 14.23 Z"
      fill="#0F0F0F"
      stroke="#0F0F0F"
      stroke-width="1"
      stroke-linejoin="round"
    />
    <!-- 주황 삼각형 면 -->
    <path
      d="M 50.15 24.41 L 18.05 81.99 Q 12.7 91.6 23.7 91.6 L 87.3 91.6 Q 98.3 91.6 92.95 81.99 L 60.85 24.41 Q 55.5 14.8 50.15 24.41 Z"
      fill="#E8940A"
    />
  </g>

  <!-- CCTV 카메라 실루엣 -->
  <g fill="#0F0F0F">
    <!-- 벽 브래킷 -->
    <path d="M21 66 Q16 66 16 71 L16 82 Q16 87 21 86 L35 79 L35 66 Z" />
    <rect x="35" y="59" width="10" height="11" rx="2" />

    <!-- 카메라 몸체 -->
    <rect x="48" y="39" width="33" height="16" rx="4.5" />

    <!-- 렌즈 (몸체와 겹치는 원통) -->
    <circle cx="41" cy="47" r="14" />
  </g>

  <!-- 렌즈 디테일 (구멍처럼 보이도록 배경색으로 뚫기) -->
  <circle cx="41" cy="47" r="10.2" fill="#E8940A" />
  <circle cx="41" cy="47" r="7.4" fill="#0F0F0F" />
  <circle cx="38" cy="44" r="1.9" fill="#E8940A" opacity="0.85" />
</svg>
